<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Mr Ninja</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        .error-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .error-content {
            max-width: 600px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 1rem;
        }
        .error-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        .error-message {
            font-size: 1.125rem;
            color: var(--gray);
            margin-bottom: 2rem;
        }
        .error-ninja {
            font-size: 5rem;
            margin-bottom: 2rem;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <span class="ninja-icon">🥷</span>
                <a href="index.html" class="brand-text" style="color: inherit; text-decoration: none;">Mr Ninja</a>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="index.html#features">Features</a>
                <a href="docs.html">Docs</a>
                <a href="https://gitlab.com/namdpran8/mr-ninja.git" class="btn-secondary" target="_blank" rel="noopener noreferrer">GitLab</a>
            </div>
        </div>
    </nav>

    <!-- Error Content -->
    <div class="error-container">
        <div class="error-content">
            <div class="error-ninja">🥷</div>
            <div class="error-code">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-message">
                Looks like this page has vanished like a ninja in the night. 
                The page you're looking for doesn't exist or has been moved.
            </p>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <a href="index.html" class="btn-primary">Go Home</a>
                <a href="docs.html" class="btn-secondary">View Docs</a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <span class="ninja-icon">🥷</span>
                    <span class="brand-text">Mr Ninja</span>
                </div>
                <div class="footer-info">
                    <p>Built for the GitLab AI Hackathon 2026</p>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
